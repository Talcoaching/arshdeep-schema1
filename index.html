<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Training Schema Arshdeep · Tal&coaching</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--green:#2D4A3E;--cream:#FDFBF3;--gold:#C97B1A;--teal:#2A7A8C;--muted:#6b7c76;--border:#ddd8cc;--white:#ffffff;--up:#27ae60;--dn:#e74c3c}
body{background:var(--cream);font-family:'Nunito',sans-serif;font-size:14px;color:var(--green);min-height:100vh}
.header{background:var(--green);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
.header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold),var(--teal))}
.header img{height:22px;filter:brightness(0) invert(1)}
.header-name{font-family:'Fraunces',serif;font-size:.9rem;font-weight:700;font-style:italic;color:rgba(255,255,255,.6)}
.week-nav{background:var(--white);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;gap:7px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.week-nav::-webkit-scrollbar{display:none}
.week-btn{flex-shrink:0;padding:6px 13px;border-radius:20px;border:1.5px solid var(--border);background:var(--cream);font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap}
.week-btn.active{background:var(--green);border-color:var(--green);color:var(--white)}
.week-btn.has-data{border-color:var(--teal);color:var(--teal)}
.week-btn.has-data.active{background:var(--green);border-color:var(--green);color:var(--white)}
.container{max-width:720px;margin:0 auto;padding:18px 13px 90px}
.week-label{font-family:'Fraunces',serif;font-size:1.3rem;font-weight:900;color:var(--green);margin-bottom:14px;padding:0 4px}
.week-label span{font-style:italic;color:var(--gold)}
.day-block{background:var(--white);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:14px}
.day-header{background:var(--green);padding:11px 17px;display:flex;align-items:center;justify-content:space-between}
.day-title{font-family:'Fraunces',serif;font-size:1rem;font-weight:900;color:var(--white)}
.day-badge{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.4)}
.exercise{border-bottom:1px solid var(--border);padding:11px 16px}
.exercise:last-of-type{border-bottom:none}
.ex-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:3px}
.ex-name{font-weight:700;font-size:13px;color:var(--green);flex:1}
.ex-tag{font-size:10px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;padding:2px 7px;border-radius:20px;flex-shrink:0;margin-top:1px}
.tag-compound{background:#edf2f0;color:var(--green)}
.tag-isolation{background:#fdf6ec;color:var(--gold)}
.tag-core{background:#eef7f9;color:var(--teal)}
.tag-upper{background:#f0edf8;color:#6c3483}
.ex-target{font-size:11px;color:var(--muted);margin-bottom:6px}
.ex-note{font-size:11px;color:var(--teal);font-style:italic;margin-bottom:6px;line-height:1.4}
.set-header{display:grid;grid-template-columns:22px 1fr 1fr 1fr 48px;gap:4px;margin-bottom:3px}
.set-row{display:grid;grid-template-columns:22px 1fr 1fr 1fr 48px;gap:4px;margin-bottom:4px;align-items:center}
.set-num{font-size:11px;color:var(--muted);font-weight:700;text-align:center}
.col-hdr{font-size:10px;font-weight:800;text-transform:uppercase;color:var(--muted);text-align:center}
input[type="text"]{width:100%;background:var(--cream);border:1px solid var(--border);border-radius:7px;padding:6px 4px;font-family:'Nunito',sans-serif;font-size:12px;color:var(--green);text-align:center;outline:none}
input[type="text"]:focus{border-color:var(--teal);background:var(--white)}
input::placeholder{color:#ccc;font-size:11px}

/* VOLUME ACCORDION */
.vol-toggle{display:flex;align-items:center;justify-content:space-between;margin-top:8px;padding:7px 10px;background:var(--cream);border-radius:8px;border:1px solid var(--border);cursor:pointer;user-select:none}
.vol-toggle-left{font-size:11px;font-weight:700;color:var(--green)}
.vol-toggle-right{display:flex;align-items:center;gap:8px}
.vol-diff-badge{font-size:11px;font-weight:700}
.vol-chevron{font-size:11px;color:var(--muted);transition:transform .2s}
.vol-chevron.open{transform:rotate(180deg)}
.vol-panel{display:none;padding:10px 10px 4px;border:1px solid var(--border);border-top:none;border-radius:0 0 8px 8px;background:var(--white)}
.vol-panel.open{display:block}
.vol-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px}
.vol-row:last-child{border-bottom:none}
.vol-date{color:var(--muted);font-size:11px}
.vol-val{font-weight:700;color:var(--green)}
.vol-chg{font-size:11px;font-weight:700}

.day-notes{padding:10px 16px;background:#fafaf7;border-top:1px solid var(--border)}
.day-notes label{font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:4px}
textarea{width:100%;background:var(--white);border:1px solid var(--border);border-radius:8px;padding:7px 9px;font-family:'Nunito',sans-serif;font-size:12px;color:var(--green);outline:none;resize:none;height:55px}
textarea:focus{border-color:var(--teal)}
.save-wrap{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--border);padding:11px 18px;display:flex;align-items:center;gap:12px;z-index:100}
.btn-save{flex:1;background:var(--green);color:var(--white);border:none;border-radius:10px;padding:12px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;cursor:pointer}
.btn-save:active{background:#1e3329}
.save-msg{font-size:12px;color:var(--teal);font-weight:700;display:none}
</style>
</head>

<script>
const WEEKS = 8;
let CW = 1;

const DATES = {
  1: '22-28 April',
  2: '11-17 May'
};

const SCHEMA = [
  {
    day:'Day 1', badge:'Lower + Upper',
    exercises:[
      {name:'Deadlift',tag:'compound',target:'3 sets · 6-8 reps · RIR 2-3',sets:3,tracked:true,l1:'Weight',l2:'Reps'},
      {name:'Push ups',tag:'upper',target:'3 sets · 8-10 reps',sets:3,tracked:false,l1:'Band',l2:'Reps'},
      {name:'Hip thrust',tag:'compound',target:'3 sets · 10 reps · RIR 2-3',sets:3,tracked:true,l1:'Weight',l2:'Reps'},
      {name:'Lateral step ups',tag:'compound',target:'3 sets · 10 reps · RIR 2-3',sets:3,tracked:true,l1:'Weight',l2:'Reps',note:'Focus on core'},
      {name:'Kickbacks',tag:'isolation',target:'3 sets · 12-15 reps · RIR 2-3',sets:3,tracked:false,l1:'Weight',l2:'Reps'},
      {name:'Plank',tag:'core',target:'3 sets · 45-50 sec',sets:3,tracked:false,l1:'Added kg',l2:'Seconds'},
      {name:'Lat pulldown',tag:'upper',target:'3 sets · 8-10 reps · RIR 2-3',sets:3,tracked:true,l1:'Weight',l2:'Reps'},
      {name:'DB Press',tag:'upper',target:'3 sets · 8 reps · RIR 2-3',sets:3,tracked:true,l1:'Weight',l2:'Reps'},
    ]
  },
  {
    day:'Day 2', badge:'Full body',
    exercises:[
      {name:'Smith machine pull up',tag:'upper',target:'3 sets · 8 reps · RIR 2-3',sets:3,tracked:false,l1:'Load',l2:'Reps',note:'Focus on core and upright motion'},
      {name:'Push press',tag:'upper',target:'3 sets · 6-7 reps · RIR 2-3',sets:3,tracked:true,l1:'Weight',l2:'Reps'},
      {name:'Split squat',tag:'compound',target:'3 sets · 8 reps · RIR 2-3',sets:3,tracked:true,l1:'Weight',l2:'Reps'},
      {name:'Hip thrust + pulses',tag:'compound',target:'3 sets · 10 reps · RIR 2-3',sets:3,tracked:false,l1:'Weight',l2:'Reps',note:'Last set pulses 30 kg'},
      {name:'Machine abduction',tag:'isolation',target:'3 sets · 12-15 reps · RIR 2-3',sets:3,tracked:false,l1:'Weight',l2:'Reps'},
      {name:'Woodchoppers',tag:'core',target:'2 sets · 15 reps · RIR 2-3',sets:2,tracked:false,l1:'Weight',l2:'Reps'},
    ]
  },
  {
    day:'Day 3', badge:'Lower + Upper',
    exercises:[
      {name:'Squat',tag:'compound',target:'3 sets · 8 reps · RIR 2-3',sets:3,tracked:true,l1:'Weight',l2:'Reps',note:'Next: 55 kg'},
      {name:'Leg press',tag:'compound',target:'3 sets · 10 reps · RIR 2-3',sets:3,tracked:true,l1:'Weight',l2:'Reps',note:'Next: 105 kg'},
      {name:'Lying leg curl',tag:'isolation',target:'3 sets · 10 reps · RIR 2-3',sets:3,tracked:true,l1:'Weight',l2:'Reps'},
      {name:'Assisted pull ups',tag:'upper',target:'3 sets · 7 reps · RIR 2-3',sets:3,tracked:false,l1:'Assist kg',l2:'Reps'},
      {name:'Hanging holds',tag:'core',target:'3 sets · 20 sec',sets:3,tracked:false,l1:'Seconds',l2:''},
      {name:'DB Bench press',tag:'upper',target:'3 sets · 8 reps · RIR 2-3',sets:3,tracked:true,l1:'Weight',l2:'Reps'},
      {name:'Leg extension',tag:'isolation',target:'3 sets · 10 reps · RIR 2-3',sets:3,tracked:true,l1:'Weight',l2:'Reps'},
      {name:'Plank',tag:'core',target:'3 sets · 50 sec',sets:3,tracked:false,l1:'Added kg',l2:'Seconds'},
    ]
  }
];


// Week 1 seed data (22-28 April)
const SEED = {
  1: {
    d0: {
      e0: {w:['60','62.5','62.5'], r:['8','6','6']},
      e1: {w:['yellow','yellow','yellow'], r:['10','8','8']},
      e2: {w:['27.5','27.5','27.5'], r:['10','10','10']},
      e3: {w:['12','12','12'], r:['10','10','10']},
      e4: {w:['15','15','15'], r:['15','15','15']},
      e5: {w:['10','10','10'], r:['45','45','40']},
      e6: {w:['35','35','35'], r:['10','8','8']},
      e7: {w:['12','12','12'], r:['8','8','8']}
    },
    d1: {
      e0: {w:['bw','bw','bw'], r:['8','8','8']},
      e1: {w:['25','25','25'], r:['6','6','7']},
      e2: {w:['18','18','18'], r:['8','8','8']},
      e3: {w:['22.5','22.5','30'], r:['10','10','10']},
      e4: {w:['55','55','55'], r:['12','12','12']},
      e5: {w:['8.5','8.5',''], r:['15','15','']}
    },
    d2: {
      e0: {w:['52.5','52.5','52.5'], r:['8','8','8']},
      e1: {w:['100','100','100'], r:['10','10','10']},
      e2: {w:['','',''], r:['','','']},
      e3: {w:['30','30','30'], r:['7','7','7']},
      e4: {w:['','',''], r:['20','20','20']},
      e5: {w:['14','14','14'], r:['8','8','5']},
      e6: {w:['35','35','35'], r:['10','10','10']},
      e7: {w:['5','5','5'], r:['50','50','50']}
    }
  }
};

function seedData(){
  Object.keys(SEED).forEach(function(week){
    var wd = SEED[week];
    ['d0','d1','d2'].forEach(function(dk, di){
      if(!wd[dk]) return;
      Object.keys(wd[dk]).forEach(function(ek){
        var ei = parseInt(ek.replace('e',''));
        var ed = wd[dk][ek];
        ed.w.forEach(function(v,s){ if(v && !localStorage.getItem(fKey(parseInt(week),di,ei,s,'w'))) localStorage.setItem(fKey(parseInt(week),di,ei,s,'w'),v); });
        ed.r.forEach(function(v,s){ if(v && !localStorage.getItem(fKey(parseInt(week),di,ei,s,'r'))) localStorage.setItem(fKey(parseInt(week),di,ei,s,'r'),v); });
      });
    });
  });
}

function fKey(w,di,ei,s,t){return 'arsh2_w'+w+'_d'+di+'_e'+ei+'_s'+s+'_'+t;}
function nKey(w,di){return 'arsh2_w'+w+'_d'+di+'_notes';}

function getVol(w,di,ei){
  let t=0;
  for(let s=0;s<SCHEMA[di].exercises[ei].sets;s++){
    const wv=parseFloat(localStorage.getItem(fKey(w,di,ei,s,'w')))||0;
    const rv=parseFloat(localStorage.getItem(fKey(w,di,ei,s,'r')))||0;
    t+=wv*rv;
  }
  return Math.round(t);
}

function toggleVol(btn){
  const panel=btn.nextElementSibling;
  const chev=btn.querySelector('.vol-chevron');
  panel.classList.toggle('open');
  chev.classList.toggle('open');
}

function volHTML(di,ei){
  const ex=SCHEMA[di].exercises[ei];
  if(!ex.tracked) return '';

  // Gather all weeks with data
  const history=[];
  for(let w=1;w<=WEEKS;w++){
    const v=getVol(w,di,ei);
    if(v>0) history.push({week:w,vol:v,date:DATES[w]||'Week '+w});
  }

  const curVol=getVol(CW,di,ei);
  const prevEntry=history.filter(h=>h.week<CW).pop();
  let diffHTML='',diffColor='var(--muted)';
  if(!prevEntry){diffHTML='First entry';}
  else{
    const d=curVol-prevEntry.vol;
    if(d>0){diffHTML='↑ +'+d;diffColor='var(--up)';}
    else if(d<0){diffHTML='↓ '+d;diffColor='var(--dn)';}
    else{diffHTML='→ Same';diffColor='var(--muted)';}
  }

  // History rows
  let rows='';
  history.forEach((h,i)=>{
    const prev=i>0?history[i-1].vol:null;
    let chg='',chgColor='var(--muted)';
    if(prev!==null){
      const d=h.vol-prev;
      if(d>0){chg='↑ +'+d;chgColor='var(--up)';}
      else if(d<0){chg='↓ '+d;chgColor='var(--dn)';}
      else{chg='→';chgColor='var(--muted)';}
    }
    const isCurrent=h.week===CW;
    rows+='<div class="vol-row" style="'+(isCurrent?'background:#f0f8f4;border-radius:6px;padding:5px 6px;':'')+'">'
      +'<span class="vol-date">'+h.date+(isCurrent?' <b style="color:var(--teal)">← now</b>':'')+'</span>'
      +'<span class="vol-val">'+h.vol+' kg·reps</span>'
      +(chg?'<span class="vol-chg" style="color:'+chgColor+'">'+chg+'</span>':'<span></span>')
      +'</div>';
  });

  if(!rows) rows='<div style="font-size:12px;color:var(--muted);padding:4px 0;">Fill in sets to track volume</div>';

  return '<div class="vol-toggle" onclick="toggleVol(this)">'
    +'<span class="vol-toggle-left">Volume: '+(curVol>0?curVol+' kg·reps':'–')+'</span>'
    +'<span class="vol-toggle-right"><span class="vol-diff-badge" style="color:'+diffColor+'">'+diffHTML+'</span><span class="vol-chevron">▾</span></span>'
    +'</div>'
    +'<div class="vol-panel">'+rows+'</div>';
}

function buildNav(){
  const nav=document.getElementById('weekNav');
  nav.innerHTML='';
  for(let w=1;w<=WEEKS;w++){
    const btn=document.createElement('button');
    btn.className='week-btn'+(w===CW?' active':'');
    let hasData=false;
    SCHEMA.forEach((d,di)=>d.exercises.forEach((ex,ei)=>{
      for(let s=0;s<ex.sets;s++) if(localStorage.getItem(fKey(w,di,ei,s,'w'))) hasData=true;
    }));
    if(hasData&&w!==CW) btn.classList.add('has-data');
    btn.textContent=(DATES[w]?'📍 ':'')+'Week '+w+(DATES[w]?' · '+DATES[w]:'');
    btn.onclick=()=>{CW=w;buildNav();renderWeek();};
    nav.appendChild(btn);
  }
}

function renderWeek(){
  const c=document.getElementById('mainContent');
  c.innerHTML='<div class="week-label">Week <span>'+CW+'</span>'+(DATES[CW]?' · '+DATES[CW]:'')+'</div>';
  SCHEMA.forEach((dayDef,di)=>{
    const db=document.createElement('div');
    db.className='day-block';
    let exHTML='';
    dayDef.exercises.forEach((ex,ei)=>{
      const sw=[],sr=[],srir=[];
      for(let s=0;s<ex.sets;s++){
        sw.push(localStorage.getItem(fKey(CW,di,ei,s,'w'))||'');
        sr.push(localStorage.getItem(fKey(CW,di,ei,s,'r'))||'');
        srir.push(localStorage.getItem(fKey(CW,di,ei,s,'rir'))||'');
      }
      const hasL2=ex.l2!=='';
      const cols=hasL2?'grid-template-columns:22px 1fr 1fr 1fr 48px':'grid-template-columns:22px 1fr 1fr 48px';
      let sHTML='<div class="set-header" style="display:grid;'+cols+';gap:4px;margin-bottom:3px;">'
        +'<span></span><span class="col-hdr">Set</span>'
        +'<span class="col-hdr">'+ex.l1+'</span>'
        +(hasL2?'<span class="col-hdr">'+ex.l2+'</span>':'')
        +'<span class="col-hdr">RIR</span>'
        +'</div>';
      for(let s=0;s<ex.sets;s++){
        sHTML+='<div class="set-row" style="display:grid;'+cols+';gap:4px;margin-bottom:4px;align-items:center;">'
          +'<div class="set-num">'+(s+1)+'</div>'
          +'<div style="font-size:10px;color:var(--muted);text-align:center;">set '+(s+1)+'</div>'
          +'<input type="text" placeholder="-" value="'+sw[s]+'" data-di="'+di+'" data-ei="'+ei+'" data-s="'+s+'" data-t="w" oninput="liveUpdate(this)" onchange="autoSave(this)">'
          +(hasL2?'<input type="text" placeholder="-" value="'+sr[s]+'" data-di="'+di+'" data-ei="'+ei+'" data-s="'+s+'" data-t="r" oninput="liveUpdate(this)" onchange="autoSave(this)">':'')
          +'<input type="text" placeholder="?" value="'+srir[s]+'" data-di="'+di+'" data-ei="'+ei+'" data-s="'+s+'" data-t="rir" onchange="autoSave(this)">'
          +'</div>';
      }
      exHTML+='<div class="exercise">'
        +'<div class="ex-top"><div class="ex-name">'+ex.name+'</div><div class="ex-tag tag-'+ex.tag+'">'+ex.tag+'</div></div>'
        +'<div class="ex-target">'+ex.target+'</div>'
        +(ex.note?'<div class="ex-note">'+ex.note+'</div>':'')
        +sHTML
        +'<div id="vol-'+di+'-'+ei+'">'+volHTML(di,ei)+'</div>'
        +'</div>';
    });
    const savedNotes=localStorage.getItem(nKey(CW,di))||'';
    db.innerHTML='<div class="day-header"><div class="day-title">'+dayDef.day+'</div><div class="day-badge">'+dayDef.badge+'</div></div>'
      +exHTML
      +'<div class="day-notes"><label>Notes</label><textarea placeholder="How did it feel?" data-di="'+di+'" onchange="saveNote(this)">'+savedNotes+'</textarea></div>';
    c.appendChild(db);
  });
}

function autoSave(inp){localStorage.setItem(fKey(CW,inp.dataset.di,inp.dataset.ei,inp.dataset.s,inp.dataset.t),inp.value);}
function saveNote(ta){localStorage.setItem(nKey(CW,ta.dataset.di),ta.value);}

function liveUpdate(inp){
  autoSave(inp);
  const di=parseInt(inp.dataset.di),ei=parseInt(inp.dataset.ei);
  if(!SCHEMA[di].exercises[ei].tracked) return;
  document.getElementById('vol-'+di+'-'+ei).innerHTML=volHTML(di,ei);
}

function saveWeek(){
  document.querySelectorAll('input[data-di]').forEach(inp=>autoSave(inp));
  document.querySelectorAll('textarea[data-di]').forEach(ta=>saveNote(ta));
  buildNav();
  const msg=document.getElementById('saveMsg');
  msg.style.display='block';
  setTimeout(()=>msg.style.display='none',2500);
}

seedData();
buildNav();
renderWeek();
</script>
</body>
</html>
